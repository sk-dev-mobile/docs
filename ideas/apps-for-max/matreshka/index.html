    let activeStage = 1;
    function renderNav() {
        const nav = document.getElementById('desktop-nav');
        const mobile = document.getElementById('mobile-menu');
        let html = '<ul class="space-y-2">';
        stagesData.forEach(s => {
            const activeClass = s.id === activeStage ? 'active bg-gray-100 border-l-2 border-black' : 'text-gray-500 hover:text-black hover:bg-gray-50';
            html += `
                <li>
                    <button onclick="setStage(${s.id})" class="nav-item w-full text-left px-4 py-3 text-xs font-semibold rounded-r transition flex items-center gap-3 ${activeClass}">
                        <span class="opacity-40 text-[10px] font-mono">0${s.id}</span> 
                        <span class="truncate">${s.title}</span>
                    </button>
                </li>
            `;
        });
        html += '</ul>';
        if(nav) nav.innerHTML = html;
        if(mobile) mobile.innerHTML = html;
    }

    function setStage(id) {
        activeStage = id;
        const stage = stagesData.find(s => s.id === id);
        if(!stage) return;
        
        const container = document.getElementById('stage-content');
        
        container.innerHTML = `
            <div class="mb-10">
                <div class="flex items-center gap-3 mb-3">
                    <span class="text-[10px] font-black tracking-widest uppercase text-gray-400 bg-gray-100 px-2 py-1 rounded">ЭТАП_0${stage.id}</span>
                </div>
                <h2 class="text-3xl lg:text-4xl font-black text-black tracking-tight">${stage.title}</h2>
            </div>
            <div id="interactive-content" class="animate-in fade-in duration-300">${stage.content}</div>
        `;
        
        renderNav();
        if(stage.onRender) stage.onRender();
        document.getElementById('mobile-menu').classList.add('hidden');
    }

    window.onload = () => {
        setStage(1);
        const btn = document.getElementById('mobile-menu-btn');
        if(btn) {
            btn.onclick = () => {
                document.getElementById('mobile-menu').classList.toggle('hidden');
            };
        }
    };
</script>
